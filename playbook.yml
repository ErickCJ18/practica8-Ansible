---
- name: Configuracion de servidores
  hosts: servidores
  become: yes

  tasks:

    - name: Actualizar APT
      apt:
        update_cache: yes
        upgrade: yes

    - name: Crear usuario itla
      user:
        name: itla
        shell: /bin/bash
        state: present

    - name: Crear carpeta app
      file:
        path: /home/ansible/app
        state: directory
        owner: ansible
        group: ansible
        mode: '0755'

    - name: Crear archivo hola.txt
      copy:
        dest: /home/ansible/app/hola.txt
        content: |
          Hola Mundo desde Ansible
        owner: ansible
        group: ansible
        mode: '0644'

    - name: Instalar cowsay y htop
      apt:
        name:
          - cowsay
          - htop
        state: present